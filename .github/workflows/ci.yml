name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run linter (ruff)
        run: uv run ruff check src/ tests/

      - name: Run formatter check (ruff)
        run: uv run ruff format --check src/ tests/

      - name: Run type checker (mypy)
        run: uv run mypy src/

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  # Build check - ensures package can be built
  build:
    name: Build Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Build package
        run: uv build

      - name: Check package contents
        run: |
          uv venv .test-venv
          VIRTUAL_ENV=.test-venv uv pip install dist/*.whl
          .test-venv/bin/axiom --help

  # Integration tests - only on main branch push
  integration:
    name: Integration Tests (Real LLM)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run integration tests
        env:
          AXIOM_INTEGRATION_TESTS: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run pytest tests/integration/ -v --tb=short
        continue-on-error: true  # Don't fail CI if LLM tests fail (they can be flaky)
